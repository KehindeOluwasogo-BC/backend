name: CI - Django Backend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests and Linting
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black coverage

    - name: Run code formatting check (Black)
      run: |
        black --check --diff .
      continue-on-error: true

    - name: Run linting (Flake8)
      run: |
        flake8 . --count --show-source --statistics
      continue-on-error: true

    - name: Set up environment variables
      run: |
        echo "SECRET_KEY=test-secret-key-for-ci-pipeline" >> $GITHUB_ENV
        echo "DEBUG=True" >> $GITHUB_ENV
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> $GITHUB_ENV
        echo "SENDGRID_API_KEY=test-key" >> $GITHUB_ENV
        echo "SENDGRID_FROM_EMAIL=test@test.com" >> $GITHUB_ENV
        echo "FROM_EMAIL=test@test.com" >> $GITHUB_ENV
        echo "FRONTEND_URL=http://localhost:3000" >> $GITHUB_ENV
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> $GITHUB_ENV

    - name: Run migrations
      run: |
        python manage.py migrate --no-input

    - name: Check for migration issues
      run: |
        python manage.py makemigrations --check --dry-run --no-input

    - name: Run tests with coverage
      run: |
        coverage run -m pytest -v
        coverage report -m
        coverage xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

    - name: Test Summary
      if: always()
      run: |
        echo "## Test Results 🧪" >> $GITHUB_STEP_SUMMARY
        echo "Python Version: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "All tests completed!" >> $GITHUB_STEP_SUMMARY
